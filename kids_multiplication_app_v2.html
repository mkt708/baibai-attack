<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かけ算たんけんたい！</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Yomogi&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #fff9e6 0%, #ffecd2 50%, #fff0f6 100%);
    min-height: 100vh;
    padding: 16px;
    overflow-x: hidden;
  }

  .app {
    max-width: 600px;
    margin: 0 auto;
  }

  .title {
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    color: #ff6b6b;
    text-shadow: 3px 3px 0 #ffd93d;
    margin-bottom: 20px;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .controls {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(255,107,107,0.12);
    margin-bottom: 20px;
    border: 3px solid #ffd93d;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .num-control {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .num-label {
    font-size: 13px;
    font-weight: 800;
    color: #888;
    letter-spacing: 1px;
  }

  .num-display {
    font-size: 48px;
    font-weight: 900;
    color: #ff6b6b;
    width: 80px;
    text-align: center;
    line-height: 1;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    font-size: 22px;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn:active { transform: scale(0.92); }

  .btn-up { background: #ff6b6b; color: white; box-shadow: 0 4px 0 #cc5050; }
  .btn-up:hover { box-shadow: 0 6px 0 #cc5050; transform: translateY(-2px); }
  .btn-down { background: #74b9ff; color: white; box-shadow: 0 4px 0 #4a90e2; }
  .btn-down:hover { box-shadow: 0 6px 0 #4a90e2; transform: translateY(-2px); }

  .operator {
    font-size: 40px;
    font-weight: 900;
    color: #a29bfe;
    padding: 0 4px;
    margin-top: 16px;
  }

  .emoji-selector {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .emoji-btn {
    font-size: 26px;
    background: #f8f0ff;
    border: 3px solid transparent;
    border-radius: 12px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .emoji-btn.active {
    border-color: #a29bfe;
    background: #ede7ff;
    transform: scale(1.15);
  }

  .equation-display {
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    color: #2d3436;
    margin-top: 12px;
  }

  .eq-num { color: #ff6b6b; font-size: 28px; }
  .eq-op { color: #a29bfe; margin: 0 4px; }
  .eq-result { color: #00b894; font-size: 32px; }
  .eq-result.hidden { opacity: 0; }

  .stage {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    min-height: 240px;
    border: 3px solid #a29bfe;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .stage-label {
    font-size: 12px;
    font-weight: 800;
    color: #a29bfe;
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-align: center;
  }

  .groups-container {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    align-items: flex-start;
    min-height: 160px;
  }

  .group-box {
    background: linear-gradient(135deg, #fff9e6, #ffecd2);
    border: 2.5px dashed #ffd93d;
    border-radius: 16px;
    padding: 10px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transform: scale(0.5) translateY(20px);
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    min-width: 60px;
    min-height: 60px;
  }

  .group-box.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  .group-label {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffd93d;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 900;
    color: #856c00;
    padding: 1px 6px;
    white-space: nowrap;
  }

  .char {
    font-size: 28px;
    opacity: 0;
    transform: scale(0) rotate(-20deg);
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: inline-block;
    cursor: default;
    user-select: none;
  }

  .char.visible {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  .char:hover {
    transform: scale(1.3) rotate(10deg);
    transition: transform 0.15s;
  }

  .go-btn {
    display: block;
    width: 100%;
    padding: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: white;
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    border: none;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 0 6px 0 #b03a1e;
    transition: all 0.15s;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .go-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #b03a1e; }
  .go-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b03a1e; }

  .result-bubble {
    text-align: center;
    padding: 16px;
    background: linear-gradient(135deg, #00b894, #00cec9);
    border-radius: 20px;
    color: white;
    font-size: 18px;
    font-weight: 900;
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    margin-bottom: 8px;
  }

  .result-bubble.visible {
    opacity: 1;
    transform: scale(1);
  }

  .result-big {
    font-size: 42px;
    display: block;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
  }

  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 999;
  }

  .confetti-piece {
    position: absolute;
    top: -20px;
    font-size: 20px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .step-indicator {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 12px;
  }

  .step-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #dfe6e9;
    transition: all 0.3s;
  }

  .step-dot.active { background: #a29bfe; transform: scale(1.3); }
  .step-dot.done { background: #00b894; }

  .narration {
    text-align: center;
    font-size: 14px;
    color: #636e72;
    font-weight: 700;
    min-height: 22px;
    margin-bottom: 8px;
  }

  .pattern-selector {
    margin-top: 12px;
    text-align: center;
  }

  .pattern-label {
    font-size: 12px;
    font-weight: 800;
    color: #888;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .pattern-btns {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pat-btn {
    font-size: 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    background: #f0f0ff;
    border: 2.5px solid transparent;
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    color: #555;
  }

  .pat-btn.active {
    border-color: #ff6b6b;
    background: #fff0f0;
    color: #ff6b6b;
    transform: scale(1.08);
  }

  .pat-btn:hover { background: #ede7ff; border-color: #a29bfe; color: #6c5ce7; }
</style>
</head>
<body>
<div class="app">
  <div class="title">🌟 かけ算たんけんたい！</div>

  <div class="controls">
    <div class="control-row">
      <div class="num-control">
        <div class="num-label">グループのかず</div>
        <div class="btn-group"><button class="btn btn-up" onclick="changeNum('a',1)">▲</button></div>
        <div class="num-display" id="display-a">2</div>
        <div class="btn-group"><button class="btn btn-down" onclick="changeNum('a',-1)">▼</button></div>
      </div>
      <div class="operator">×</div>
      <div class="num-control">
        <div class="num-label">1グループのかず</div>
        <div class="btn-group"><button class="btn btn-up" onclick="changeNum('b',1)">▲</button></div>
        <div class="num-display" id="display-b">3</div>
        <div class="btn-group"><button class="btn btn-down" onclick="changeNum('b',-1)">▼</button></div>
      </div>
    </div>

    <div class="emoji-selector">
      <button class="emoji-btn active" onclick="selectEmoji('🐱')">🐱</button>
      <button class="emoji-btn" onclick="selectEmoji('🐶')">🐶</button>
      <button class="emoji-btn" onclick="selectEmoji('🐸')">🐸</button>
      <button class="emoji-btn" onclick="selectEmoji('🌸')">🌸</button>
      <button class="emoji-btn" onclick="selectEmoji('⭐')">⭐</button>
      <button class="emoji-btn" onclick="selectEmoji('🍎')">🍎</button>
      <button class="emoji-btn" onclick="selectEmoji('🦄')">🦄</button>
      <button class="emoji-btn" onclick="selectEmoji('😀')" title="かおモード">😀</button>
    </div>
    <div class="pattern-selector">
      <div class="pattern-label">おもしろパターン</div>
      <div class="pattern-btns">
        <button class="pat-btn active" onclick="selectPattern('normal')" title="ふつう">😐 ふつう</button>
        <button class="pat-btn" onclick="selectPattern('random')" title="バラバラ顔">🎲 バラバラ</button>
        <button class="pat-btn" onclick="selectPattern('chaos')" title="カオス集団">🤪 カオス</button>
        <button class="pat-btn" onclick="selectPattern('story')" title="ドラマ集団">🎭 ドラマ</button>
      </div>
    </div>

    <div class="equation-display" id="equation">
      <span class="eq-num" id="eq-a">2</span>
      <span class="eq-op">グループ</span>
      <span class="eq-op">×</span>
      <span class="eq-num" id="eq-b">3</span>
      <span class="eq-op">ひき</span>
      <span class="eq-op">=</span>
      <span class="eq-result hidden" id="eq-result">6</span>
    </div>
  </div>

  <div class="step-indicator" id="step-indicator"></div>
  <div class="narration" id="narration">「スタート！」ボタンをおしてね 🎮</div>

  <button class="go-btn" id="go-btn" onclick="startAnimation()">🚀 スタート！</button>

  <div class="result-bubble" id="result-bubble">
    ぜんぶで <span class="result-big" id="result-num">6</span> ひき！🎉
  </div>

  <div class="stage">
    <div class="stage-label">👀 みてみよう！</div>
    <div class="groups-container" id="groups-container"></div>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
  let numA = 2, numB = 3, emoji = '🐱';
  let pattern = 'normal';
  let animating = false;

  // Face emoji sets
  const faceEmojis = ['😀','😂','🤣','😅','😆','🤩','😎','🥳','😜','🤪','😝','🥴','😵','🤯','🥸','😤','😠','😡','🤬','😱','😨','😰','😭','😢','🤧','😷','🤒','🤠','🥺','😳','😲','🤭','🫣','😬','🙄','😏','😒','😑','😐','🤔'];
  const happyFaces  = ['😀','😄','😁','🤩','😎','🥳','😜','😂','🤣','😆'];
  const sadFaces    = ['😢','😭','😰','😨','😱','🥺','😔','😞','😓','😿'];
  const angryFaces  = ['😤','😠','😡','🤬','😾','💢','👿','😤','🤯','😤'];
  const sillyFaces  = ['🤪','😜','😝','🥴','😵','🤯','🥸','😬','🙄','🤭'];

  // Pattern configs
  const patterns = {
    normal: { label: 'ふつう', getEmoji: (base, g, c) => base },
    random: { label: 'バラバラ顔', getEmoji: (base, g, c) => {
      if (base === '😀') return faceEmojis[Math.floor(Math.random() * faceEmojis.length)];
      return base;
    }},
    chaos: { label: 'カオス集団', getEmoji: (base, g, c) => {
      const all = ['🐱','🐶','🐸','🌸','⭐','🍎','🦄','😀','🤪','😎','🥳','😜','🤯','🥺','😂'];
      return all[Math.floor(Math.random() * all.length)];
    }},
    story: { label: 'ドラマ集団', getEmoji: (base, g, c) => {
      // One leader (happy), one grumpy, rest random silly
      if (c === 0) return happyFaces[g % happyFaces.length];
      if (c === numB - 1 && numB > 1) return angryFaces[g % angryFaces.length];
      return sillyFaces[Math.floor(Math.random() * sillyFaces.length)];
    }}
  };

  const patternNarrations = {
    normal: (g, e, n) => `グループ ${g} とうじょう！ ${e} が ${n} ひき はいるよ`,
    random: (g, e, n) => `グループ ${g} とうじょう！ みんなちがう かおだよ 😆`,
    chaos: (g, e, n) => `グループ ${g} とうじょう！ カオスな ${n} にんが あつまった！🤪`,
    story: (g, e, n) => {
      const stories = ['リーダーが あつめた！','なかよし チームだよ！','ケンカしてる？！','ふしぎな なかまたち！'];
      return `グループ ${g}: ${stories[(g-1) % stories.length]}`;
    }
  };

  function changeNum(which, delta) {
    if (animating) return;
    if (which === 'a') {
      numA = Math.max(1, Math.min(9, numA + delta));
      document.getElementById('display-a').textContent = numA;
      document.getElementById('eq-a').textContent = numA;
    } else {
      numB = Math.max(1, Math.min(9, numB + delta));
      document.getElementById('display-b').textContent = numB;
      document.getElementById('eq-b').textContent = numB;
    }
    document.getElementById('eq-result').textContent = numA * numB;
    document.getElementById('result-num').textContent = numA * numB;
    resetStage();
  }

  function selectEmoji(e) {
    emoji = e;
    document.querySelectorAll('.emoji-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent === e);
    });
    resetStage();
  }

  function selectPattern(p) {
    pattern = p;
    document.querySelectorAll('.pat-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${p}'`));
    });
    resetStage();
  }

  function getEmojiForSlot(g, c) {
    return patterns[pattern].getEmoji(emoji, g, c);
  }

  function resetStage() {
    document.getElementById('groups-container').innerHTML = '';
    document.getElementById('result-bubble').classList.remove('visible');
    document.getElementById('eq-result').classList.add('hidden');
    document.getElementById('narration').textContent = '「スタート！」ボタンをおしてね 🎮';
    document.getElementById('go-btn').textContent = '🚀 スタート！';
    document.getElementById('go-btn').onclick = startAnimation;
    document.getElementById('go-btn').disabled = false;
    updateStepDots(0);
    animating = false;
  }

  function updateStepDots(currentStep) {
    const indicator = document.getElementById('step-indicator');
    const totalSteps = numA + 1;
    indicator.innerHTML = '';
    for (let i = 0; i < totalSteps; i++) {
      const dot = document.createElement('div');
      dot.className = 'step-dot';
      if (i < currentStep) dot.classList.add('done');
      else if (i === currentStep) dot.classList.add('active');
      indicator.appendChild(dot);
    }
  }

  async function startAnimation() {
    if (animating) return;
    animating = true;
    resetStageOnly();

    const container = document.getElementById('groups-container');
    const btn = document.getElementById('go-btn');
    btn.textContent = '⏳ アニメーション中...';
    btn.disabled = true;

    const getNarration = patternNarrations[pattern];

    for (let g = 0; g < numA; g++) {
      updateStepDots(g);
      document.getElementById('narration').textContent = getNarration(g + 1, emoji, numB);

      const groupBox = document.createElement('div');
      groupBox.className = 'group-box';
      groupBox.innerHTML = `<div class="group-label">グループ ${g+1}</div>`;

      const chars = [];
      for (let c = 0; c < numB; c++) {
        const ch = document.createElement('span');
        ch.className = 'char';
        ch.textContent = getEmojiForSlot(g, c);
        groupBox.appendChild(ch);
        chars.push(ch);
      }
      container.appendChild(groupBox);

      await delay(80);
      groupBox.classList.add('visible');
      await delay(200);

      for (let c = 0; c < chars.length; c++) {
        await delay(120);
        chars[c].classList.add('visible');
      }
      await delay(400);
    }

    updateStepDots(numA);
    document.getElementById('narration').textContent = `ぜんぶで ${numA} × ${numB} = ${numA * numB} にん！🎉`;

    await delay(300);
    document.getElementById('eq-result').classList.remove('hidden');
    document.getElementById('result-num').textContent = numA * numB;
    document.getElementById('result-bubble').classList.add('visible');

    launchConfetti();

    btn.textContent = '🔄 もういちど！';
    btn.disabled = false;
    btn.onclick = () => { resetStage(); };
    animating = false;
  }

  function resetStageOnly() {
    document.getElementById('groups-container').innerHTML = '';
    document.getElementById('result-bubble').classList.remove('visible');
    document.getElementById('eq-result').classList.add('hidden');
    updateStepDots(0);
  }

  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function launchConfetti() {
    const container = document.getElementById('confetti');
    const items = ['🌟','✨','🎉','🎊','💫','🌈','⭐','😂','🤩','🥳'];
    for (let i = 0; i < 28; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.textContent = items[Math.floor(Math.random() * items.length)];
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      piece.style.animationDelay = (Math.random() * 0.8) + 's';
      piece.style.fontSize = (16 + Math.random() * 16) + 'px';
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 4000);
    }
  }

  // init
  document.getElementById('eq-result').textContent = numA * numB;
  document.getElementById('result-num').textContent = numA * numB;
  updateStepDots(0);
</script>
</body>
</html>
